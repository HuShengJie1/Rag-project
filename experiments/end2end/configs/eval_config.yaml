project_name: "基于RAG框架的工程认证私有知识助手"

systems:
  - S1
  - S2
  - S3

data:
  test_queries_path: "experiments/end2end/data/test_queries.json"
  corpus_chunks_path: "experiments/end2end/data/corpus_chunks.json"

models:
  dense_model_name_or_path: "models/hf_cache/hub/BAAI/bge-m3"
  reranker_model_name_or_path: "models/bge-reranker-v2-m3"

retrieval:
  top_k_dense: 20
  top_k_rerank: 10
  top_k_context: 5

generation:
  provider: "kimi"
  api_key_env: "KIMI_API_KEY"
  base_url: "https://api.moonshot.cn/v1"
  model: "moonshot-v1-8k"
  temperature: 0.1
  max_tokens: 512
  timeout_sec: 60
  no_answer_text: "未在材料中找到相关信息"

metrics:
  faithfulness_mode: "heuristic"
  answer_relevance_mode: "embedding"

runtime:
  device: "cpu"
  batch_size: 32

output:
  detailed_results_csv: "experiments/end2end/outputs/detailed_results.csv"
  summary_results_csv: "experiments/end2end/outputs/summary_results.csv"
  retrieval_results_csv: "experiments/end2end/outputs/retrieval_results.csv"
  generation_results_csv: "experiments/end2end/outputs/generation_results.csv"
  chapter5_result_summary_md: "experiments/end2end/reports/chapter5_result_summary.md"
  chapter5_observations_md: "experiments/end2end/reports/chapter5_observations.md"

logging:
  log_file: "experiments/end2end/logs/eval.log"
  level: "INFO"
